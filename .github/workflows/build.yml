name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Write credentials
        run: |
          [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.CREDENTIALS_JSON }}")) | Out-File -FilePath credentials.json -Encoding utf8NoBOM
        shell: pwsh

      - name: Build EXE
        run: pyinstaller restrict_drive.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: restrict-drive-windows
          path: dist/restrict_drive.exe

      - name: Create release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/restrict_drive.exe
